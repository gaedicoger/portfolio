<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <nav>
        <div class="logo">
          <img class="imglogo" src="/images/icone_clavier.png" alt="" />
        </div>
        <div class="nav-right">
          <div class="itemnav">
            <img class="imglogo" src="/images/icone_site.png" alt="" />
          </div>
          <div class="itemnav">
            <img class="imglogo" src="/images/icone_brain.png" alt="" />
          </div>
          <div class="itemnav">
            <img class="imglogo" src="/images/icone_photo.png" alt="" />
          </div>
        </div>
      </nav>
    </header>
    <main>
      <section id="section-presentation">
        <h1>Gaédic Oger</h1>
        <h2>Développeuse en construction</h2>
        <h3>Uploading...</h3>
        <div class="presentation-cards">
          <div class="pres-card"></div>
          <div class="pres-card"></div>
          <div class="pres-card"></div>
          <div class="pres-card"></div>
          <div class="pres-card"></div>
        </div>
      </section>
      <section id="section-skills">
        <h1>Compétences / Outils</h1>
        <div class="skills-cloud"></div>
      </section>
      <section id="section-projects">
        <h1>Projets / Productions</h1>
        <div class="carousel-wrapper">
          <div class="carousel-track" id="track-projects"></div>
        </div>
        <div class="carousel-arrows">
          <button class="arrow-btn" id="prev-projects">‹</button>
          <button class="arrow-btn" id="next-projects">›</button>
        </div>
        <div class="carousel-dots" id="dots-projects"></div>
      </section>
      <section id="section-certification">
        <h1>Formations / Certifications</h1>
        <div class="carousel-wrapper">
          <div class="carousel-track" id="track-formations"></div>
        </div>
        <div class="carousel-arrows">
          <button class="arrow-btn" id="prev-formations">‹</button>
          <button class="arrow-btn" id="next-formations">›</button>
        </div>
        <div class="carousel-dots" id="dots-formations"></div>
      </section>

      <!-- Modale -->
      <div class="modal-overlay" id="modal">
        <div class="modal">
          <button class="modal-close" id="modal-close">✕</button>
          <div class="modal-img" id="m-img"></div>
          <div class="modal-title" id="m-title"></div>
          <p class="modal-desc" id="m-desc"></p>
          <a class="modal-link" id="m-link" href="#" target="_blank"
            >Voir le projet →</a
          >
        </div>
      </div>
    </main>
    <footer></footer>
    <script src="script.js"></script>
    <!-- Bouton retour en haut -->
    <button
      id="btn-top"
      onclick="window.scrollTo({ top: 0, behavior: 'smooth' })"
    >
      ↑
    </button>
  </body>
</html>
