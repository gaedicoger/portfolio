<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/nav.css" />
    <link rel="stylesheet" href="css/sections.css" />
    <link rel="stylesheet" href="css/presentation.css" />
    <link rel="stylesheet" href="css/skills.css" />
    <link rel="stylesheet" href="css/projets.css" />
    <link rel="stylesheet" href="css/formations.css" />
    <link rel="stylesheet" href="css/footer.css" />
    <link rel="icon" type="image/png" href="images/icone_clavier.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <svg
      id="bg-circuit"
      viewBox="0 0 800 400"
      preserveAspectRatio="xMidYMid slice"
      xmlns="http://www.w3.org/2000/svg"
    >
      <!-- Lignes verticales roses -->
      <polyline
        points="320,0 320,120 360,160 360,240 320,280 320,400"
        stroke="#fd4d67"
        stroke-width="1.5"
        fill="none"
        opacity="0.25"
      />
      <polyline
        points="340,0 340,80 380,120 380,200 340,240 340,400"
        stroke="#fd4d67"
        stroke-width="1"
        fill="none"
        opacity="0.15"
      />
      <polyline
        points="300,0 300,160 260,200 260,280 300,320 300,400"
        stroke="#fd4d67"
        stroke-width="1"
        fill="none"
        opacity="0.12"
      />

      <!-- Lignes verticales oranges -->
      <polyline
        points="460,0 460,100 420,140 420,220 460,260 460,400"
        stroke="#ffb840"
        stroke-width="1.5"
        fill="none"
        opacity="0.25"
      />
      <polyline
        points="440,0 440,60 480,100 480,180 440,220 440,400"
        stroke="#ffb840"
        stroke-width="1"
        fill="none"
        opacity="0.15"
      />
      <polyline
        points="480,0 480,140 520,180 520,260 480,300 480,400"
        stroke="#ffb840"
        stroke-width="1"
        fill="none"
        opacity="0.12"
      />

      <!-- Points de connexion roses -->
      <circle cx="320" cy="120" r="3" fill="#fd4d67" opacity="0.3" />
      <circle cx="360" cy="160" r="3" fill="#fd4d67" opacity="0.3" />
      <circle cx="360" cy="240" r="3" fill="#fd4d67" opacity="0.3" />
      <circle cx="320" cy="280" r="3" fill="#fd4d67" opacity="0.3" />

      <!-- Points de connexion oranges -->
      <circle cx="460" cy="100" r="3" fill="#ffb840" opacity="0.3" />
      <circle cx="420" cy="140" r="3" fill="#ffb840" opacity="0.3" />
      <circle cx="420" cy="220" r="3" fill="#ffb840" opacity="0.3" />
      <circle cx="460" cy="260" r="3" fill="#ffb840" opacity="0.3" />

      <!-- Connexions horizontales pointillées -->
      <line
        x1="320"
        y1="160"
        x2="460"
        y2="160"
        stroke="#fd4d67"
        stroke-width="0.8"
        opacity="0.1"
        stroke-dasharray="4,4"
      />
      <line
        x1="360"
        y1="240"
        x2="420"
        y2="240"
        stroke="#ffb840"
        stroke-width="0.8"
        opacity="0.1"
        stroke-dasharray="4,4"
      />

      <!-- Blocs rectangulaires style pixel -->
      <rect
        x="290"
        y="180"
        width="40"
        height="8"
        rx="1"
        fill="#fd4d67"
        opacity="0.08"
      />
      <rect
        x="470"
        y="200"
        width="40"
        height="8"
        rx="1"
        fill="#ffb840"
        opacity="0.08"
      />
      <rect
        x="310"
        y="320"
        width="30"
        height="6"
        rx="1"
        fill="#fd4d67"
        opacity="0.06"
      />
      <rect
        x="450"
        y="300"
        width="30"
        height="6"
        rx="1"
        fill="#ffb840"
        opacity="0.06"
      />
    </svg>
    <header>
      <nav>
        <div class="logo">
          <img class="imglogo" src="/images/icone_clavier.png" alt="" />
        </div>
        <div class="nav-right">
          <div class="itemnav active-profile">
            <!-- profil dev → actif, pas de classe -->
            <img class="imglogo" src="images/icone_site.png" alt="dev" />
          </div>
          <div class="itemnav coming-soon">
            <!-- artiste → bientôt -->
            <img class="imglogo" src="images/icone_brain.png" alt="artiste" />
          </div>
          <div class="itemnav coming-soon">
            <!-- péda → bientôt -->
            <img class="imglogo" src="images/icone_photo.png" alt="pédagogie" />
          </div>
        </div>
      </nav>
    </header>
    <main>
      <section id="section-presentation">
        <h1>Gaédic Oger</h1>
        <h2>Développeuse Fullstack en construction</h2>
        <h3>Uploading...</h3>
        <div class="presentation-cards">
          <div class="pres-card"></div>
          <div class="pres-card"></div>
          <div class="pres-card"></div>
          <div class="pres-card"></div>
          <div class="pres-card"></div>
        </div>
        <div class="scroll-indicator">
          <span class="scroll-text">Scroll</span>
          <div class="arrow"></div>
          <div class="arrow"></div>
          <div class="arrow"></div>
        </div>
      </section>
      <section id="section-skills">
        <h1>Compétences / Outils</h1>
        <div class="skills-cloud"></div>
      </section>
      <section id="section-projects">
        <h1>Projets / Productions</h1>
        <div class="carousel-wrapper">
          <div class="carousel-track" id="track-projects"></div>
        </div>
        <div class="carousel-arrows">
          <button class="arrow-btn" id="prev-projects">‹</button>
          <button class="arrow-btn" id="next-projects">›</button>
        </div>
        <div class="carousel-dots" id="dots-projects"></div>
      </section>
      <section id="section-certification">
        <h1>Formations / Certifications</h1>
        <div class="timeline-cards">
          <div class="timeline-line"></div>
          <div class="timeline-track" id="timeline-track"></div>
        </div>
        <div class="timeline-arrows">
          <button class="tarrow" id="tprev">‹</button>
          <button class="tarrow" id="tnext">›</button>
        </div>
      </section>

      <!-- Modale -->
      <div class="modal-overlay" id="modal">
        <div class="modal">
          <button class="modal-close" id="modal-close">✕</button>
          <div class="modal-img" id="m-img"></div>
          <div class="modal-title" id="m-title"></div>
          <p class="modal-desc" id="m-desc"></p>
          <a class="modal-link" id="m-link" href="#" target="_blank"
            >Voir le projet →</a
          >
        </div>
      </div>
    </main>
    <footer>
      <div class="footer-links">
        <a
          href="https://www.linkedin.com/in/gaedic-oger/"
          class="footer-link"
          target="_blank"
        >
          <i class="fa-brands fa-linkedin"></i>
          LinkedIn
        </a>
        <a
          href="https://github.com/gaedicoger"
          class="footer-link"
          target="_blank"
        >
          <i class="fa-brands fa-github"></i>
          GitHub
        </a>
      </div>
      <p class="footer-copy">
        © 2026 <span>Gaédic Oger</span> — Développeuse Fullstack
      </p>
    </footer>
    <script src="script.js"></script>
    <!-- Bouton retour en haut -->
    <button
      id="btn-top"
      onclick="window.scrollTo({ top: 0, behavior: 'smooth' })"
    >
      ↑
    </button>
    <div class="lightbox" id="lightbox">
      <img id="lightbox-img" src="" alt="" />
    </div>
  </body>
</html>
