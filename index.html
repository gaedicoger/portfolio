<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/nav.css" />
    <link rel="stylesheet" href="css/sections.css" />
    <link rel="stylesheet" href="css/presentation.css" />
    <link rel="stylesheet" href="css/skills.css" />
    <link rel="stylesheet" href="css/projets.css" />
    <link rel="stylesheet" href="css/parcours.css" />
    <link rel="stylesheet" href="css/formations.css" />
    <link rel="stylesheet" href="css/footer.css" />
    <link rel="icon" type="image/png" href="images/icone_clavier.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <img id="bg-circuit" src="svg/background.svg" alt="" />
    <header>
      <nav>
        <div class="logo">
          <img class="imglogo" src="/images/icone_clavier.png" alt="" />
        </div>
        <div class="nav-right">
          <div class="itemnav active-profile">
            <!-- profil dev → actif, pas de classe -->
            <img class="imglogo" src="images/icone_site.png" alt="dev" />
          </div>
          <div class="itemnav coming-soon">
            <!-- artiste → bientôt -->
            <img class="imglogo" src="images/icone_brain.png" alt="artiste" />
          </div>
          <div class="itemnav coming-soon">
            <!-- péda → bientôt -->
            <img class="imglogo" src="images/icone_photo.png" alt="pédagogie" />
          </div>
        </div>
      </nav>
    </header>
    <main>
      <section id="section-presentation">
        <h1>Gaédic Oger</h1>
        <h2>Développeuse Fullstack en construction</h2>
        <h3>Uploading...</h3>
        <div class="presentation-cards">
          <div class="pres-card"></div>
          <div class="pres-card"></div>
          <div class="pres-card"></div>
          <div class="pres-card"></div>
          <div class="pres-card"></div>
        </div>
        <div class="scroll-indicator">
          <span class="scroll-text">Scroll</span>
          <div class="arrow"></div>
          <div class="arrow"></div>
          <div class="arrow"></div>
        </div>
      </section>
      <section id="section-skills">
        <h1>Compétences / Outils</h1>
        <div class="skills-cloud"></div>
      </section>
      <section id="section-projects">
        <h1>Projets / Productions</h1>
        <div class="carousel-wrapper">
          <div class="carousel-track" id="track-projects"></div>
        </div>
        <div class="carousel-arrows">
          <button class="arrow-btn" id="prev-projects">‹</button>
          <button class="arrow-btn" id="next-projects">›</button>
        </div>
        <div class="carousel-dots" id="dots-projects"></div>
      </section>
      <section id="section-parcours">
        <h1>Mon Parcours pro</h1>
        <div class="serpentin" id="serpentin-track"></div>
      </section>
      <section id="section-certification">
        <h1>Formations / Certifications</h1>
        <div class="timeline-cards">
          <div class="timeline-line"></div>
          <div class="timeline-track" id="timeline-track"></div>
        </div>
        <div class="timeline-arrows">
          <button class="tarrow" id="tprev">‹</button>
          <button class="tarrow" id="tnext">›</button>
        </div>
      </section>

      <!-- Modale -->
      <div class="modal-overlay" id="modal">
        <div class="modal">
          <button class="modal-close" id="modal-close">✕</button>
          <div class="modal-img" id="m-img"></div>
          <div class="modal-title" id="m-title"></div>
          <p class="modal-desc" id="m-desc"></p>
          <a class="modal-link" id="m-link" href="#" target="_blank"
            >Voir le projet →</a
          >
        </div>
      </div>
    </main>
    <footer>
      <div class="footer-links">
        <a
          href="https://www.linkedin.com/in/gaedic-oger/"
          class="footer-link"
          target="_blank"
        >
          <i class="fa-brands fa-linkedin"></i>
          LinkedIn
        </a>
        <a
          href="https://github.com/gaedicoger"
          class="footer-link"
          target="_blank"
        >
          <i class="fa-brands fa-github"></i>
          GitHub
        </a>
      </div>
      <p class="footer-copy">
        © 2026 <span>Gaédic Oger</span> — Développeuse Fullstack
      </p>
    </footer>
    <script src="js/main.js"></script>
    <script src="js/skills.js"></script>
    <script src="js/carousel.js"></script>
    <script src="js/timeline.js"></script>
    <script src="js/parcours.js"></script>
    <script src="js/modal.js"></script>
    <!-- Bouton retour en haut -->
    <button
      id="btn-top"
      onclick="window.scrollTo({ top: 0, behavior: 'smooth' })"
    >
      ↑
    </button>
    <div class="lightbox" id="lightbox">
      <img id="lightbox-img" src="" alt="" />
    </div>
  </body>
</html>
